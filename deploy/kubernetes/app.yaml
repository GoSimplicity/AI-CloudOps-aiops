apiVersion: v1
kind: Namespace
metadata:
  name: aiops
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-config
  namespace: aiops
data:
  # 环境配置
  ENV: "production"
  
  # 外部服务连接信息（环境相关）
  PROMETHEUS_HOST: "prometheus:9090"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  OLLAMA_BASE_URL: "http://ollama:11434/v1"
  RCA_JAEGER_QUERY_URL: "http://jaeger-query:16686"
---
apiVersion: v1
kind: Secret
metadata:
  name: aiops-secrets
  namespace: aiops
type: Opaque
data:
  # Base64 编码的敏感信息（使用时需要实际填入）
  LLM_API_KEY: ""  # echo -n "your-api-key" | base64
  LLM_BASE_URL: "aHR0cHM6Ly9hcGkuc2lsaWNvbmZsb3cuY24vdjE="  # https://api.siliconflow.cn/v1
  FEISHU_WEBHOOK: ""  # echo -n "your-webhook-url" | base64  
  TAVILY_API_KEY: ""  # echo -n "your-tavily-key" | base64
  REDIS_PASSWORD: ""  # echo -n "your-redis-password" | base64
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-platform
  namespace: aiops
  labels:
    app: aiops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-platform
  template:
    metadata:
      labels:
        app: aiops-platform
    spec:
      containers:
        - name: api
          image: aiops/ai-CloudOps:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: aiops-config
            - secretRef:
                name: aiops-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-platform
  namespace: aiops
spec:
  selector:
    app: aiops-platform
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiops-platform
  namespace: aiops
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: aiops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aiops-platform
                port:
                  number: 80
