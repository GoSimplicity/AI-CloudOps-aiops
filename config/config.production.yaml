# AI-CloudOps 生产环境配置
app:
  debug: false
  host: 0.0.0.0
  port: 8080
  log_level: WARNING

# Prometheus监控配置
prometheus:
  host: prometheus:9090
  timeout: 60

# LLM模型配置
llm:
  provider: openai
  model: Qwen/Qwen3-14B
  task_model: Qwen/Qwen2.5-14B-Instruct
  temperature: 0.1
  max_tokens: 2048
  request_timeout: 30
  ollama_model: qwen2.5:3b
  ollama_base_url: http://ollama:11434

# Kubernetes配置
kubernetes:
  in_cluster: true
  namespace: aiops

# 根因分析配置
rca:
  default_time_range: 30
  max_time_range: 1440
  anomaly_threshold: 0.7
  correlation_threshold: 0.75
  default_metrics:
    - container_cpu_usage_seconds_total
    - container_memory_working_set_bytes
    - kube_pod_container_status_restarts_total
    - node_cpu_seconds_total
    - node_memory_MemFree_bytes

# 预测配置
prediction:
  model_path: /app/data/models/time_qps_auto_scaling_model.pkl
  scaler_path: /app/data/models/time_qps_auto_scaling_scaler.pkl
  max_instances: 50
  min_instances: 2

# 通知配置
notification:
  enabled: true

# Redis配置
redis:
  host: redis
  port: 6379
  db: 0
  connection_timeout: 10
  max_connections: 20

# RAG助手配置
rag:
  vector_db_path: /app/data/vector_db
  collection_name: aiops-assistant
  knowledge_base_path: /app/data/knowledge_base
  chunk_size: 1000
  chunk_overlap: 200
  top_k: 4
  similarity_threshold: 0.75
  openai_embedding_model: Pro/BAAI/bge-m3
  ollama_embedding_model: nomic-embed-text
  max_context_length: 4000
  temperature: 0.05
  cache_expiry: 7200

# MCP配置
mcp:
  server_url: http://mcp:9000
  timeout: 180
  max_retries: 5