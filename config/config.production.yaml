# AI-CloudOps 生产环境配置
app:
  debug: false
  host: 0.0.0.0
  port: 8080
  log_level: WARNING

# Prometheus监控配置
prometheus:
  host: prometheus:9090
  timeout: 60

# LLM模型配置
llm:
  provider: openai
  model: Qwen/Qwen3-14B
  task_model: Qwen/Qwen2.5-14B-Instruct
  temperature: 0.1
  max_tokens: 2048
  request_timeout: 30
  ollama_model: qwen2.5:3b
  ollama_base_url: http://ollama:11434

# Kubernetes配置
kubernetes:
  in_cluster: true
  namespace: aiops

# 根因分析配置
rca:
  default_time_range: 30
  max_time_range: 4320
  anomaly_threshold: 0.7
  correlation_threshold: 0.75
  request_override: true
  default_metrics:
    - container_cpu_usage_seconds_total
    - container_memory_working_set_bytes
    - kube_pod_container_status_restarts_total
    - node_cpu_seconds_total
    - node_memory_MemFree_bytes
  # 生产建议更保守的资源参数
  metrics_step_minutes: 2
  metrics_fetch_concurrency: 2
  max_series_per_metric: 3
  max_total_series: 200
  correlation_max_columns: 80
  correlation_return_top_k: 5
  enable_cross_lag_in_analyze: false
  cross_lag_max_lags: 5
  cross_lag_max_pairs_per_metric: 3
  recover_on_startup: true
  recover_stale_seconds: 300
  recover_max_jobs: 100

# 日志采集配置
logs:
  enabled: true
  tail_lines: 200
  max_pods: 5
  include_previous: true

# Trace/OTel/Jaeger 配置
tracing:
  enabled: true
  provider: jaeger
  jaeger_query_url: http://jaeger-query:16686
  timeout: 20
  service_name: ""
  max_traces: 50

# 预测配置
prediction:
  model_path: /app/data/models/time_qps_auto_scaling_model.pkl
  scaler_path: /app/data/models/time_qps_auto_scaling_scaler.pkl
  max_instances: 50
  min_instances: 2

# 通知配置
notification:
  enabled: true

# Redis配置
redis:
  host: redis
  port: 6379
  db: 0
  connection_timeout: 10
  max_connections: 20

# RAG助手配置
rag:
  vector_db_path: /app/data/vector_db
  collection_name: aiops-assistant
  knowledge_base_path: /app/data/knowledge_base
  openai_embedding_model: Pro/BAAI/bge-m3
  ollama_embedding_model: nomic-embed-text
  retrieve:
    k: 12
    score_threshold: 0.0
    hybrid_enabled: false
  reranker:
    enabled: false
    model: bge-reranker-base
    top_k: 20
  iteration:
    max_loops: 1
    retry_confidence_threshold: 0.6
  compression:
    mmr_top_k: 6
    mmr_lambda: 0.7
  answer:
    max_chars: 300
    source_limit: 4

# MCP配置
mcp:
  server_url: http://mcp:9000
  timeout: 180
  max_retries: 5