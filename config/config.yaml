# AI-CloudOps 应用配置
app:
  debug: true
  host: 0.0.0.0
  port: 8080
  log_level: INFO

# Prometheus监控配置
prometheus:
  host: 127.0.0.1:9090
  timeout: 30

# LLM模型配置
llm:
  provider: openai
  model: deepseek-ai/DeepSeek-V3
  task_model: Qwen/Qwen2.5-14B-Instruct
  temperature: 0.7
  max_tokens: 2048
  request_timeout: 15
  ollama_model: qwen2.5:3b
  ollama_base_url: http://127.0.0.1:11434/v1

# Kubernetes配置
kubernetes:
  in_cluster: false
  config_path: deploy/kubernetes/config
  namespace: default

# 自动修复/多Agent配置
remediation:
  enabled: true
  dry_run: true           # 高风险环境建议开启
  allow_rollback: true    # 验证失败自动回滚
  verify_wait_seconds: 20 # 验证等待时间
  max_concurrent: 3
  safe_mode: false        # 仅告警不执行变更
  namespace_whitelist: []
  namespace_blacklist: []

# 根因分析配置
rca:
  default_time_range: 30
  max_time_range: 1440
  anomaly_threshold: 0.65
  correlation_threshold: 0.7
  request_override: false
  default_metrics:
    - container_cpu_usage_seconds_total
    - container_memory_working_set_bytes
    - kube_pod_container_status_restarts_total
    - node_cpu_seconds_total
    - node_memory_MemFree_bytes

# 日志采集配置
logs:
  enabled: false
  tail_lines: 200
  max_pods: 5
  include_previous: false

# Trace/OTel/Jaeger 配置
tracing:
  enabled: false
  provider: jaeger
  jaeger_query_url: http://127.0.0.1:16686
  timeout: 15
  service_name: ""
  max_traces: 30

# 预测配置
prediction:
  model_path: data/models/time_qps_auto_scaling_model.pkl
  scaler_path: data/models/time_qps_auto_scaling_scaler.pkl
  max_instances: 20
  min_instances: 1

# 通知配置
notification:
  enabled: true

# Redis配置
redis:
  host: 127.0.0.1
  port: 6379
  db: 0
  password: "v6SxhWHyZC7S"
  connection_timeout: 5
  max_connections: 10
  socket_timeout: 5

# MySQL 数据库（仅用于本服务 cl_ 前缀表，不影响主平台表）
database:
  host: localhost
  port: 3306
  username: root
  password: root
  name: cloudops
  echo: false
  pool_size: 5
  max_overflow: 10
  pool_recycle: 1800

# RAG助手配置
rag:
  vector_db_path: data/vector_db
  collection_name: aiops-assistant
  knowledge_base_path: data/knowledge_base
  openai_embedding_model: Pro/BAAI/bge-m3
  ollama_embedding_model: nomic-embed-text

  # LangGraph/RAG 细粒度参数
  retrieve:
    k: 12
    score_threshold: 0.0
    hybrid_enabled: false    # 预留：向量+BM25/关键词混合
  reranker:
    enabled: false           # 预留：如 bge-reranker/jina-reranker
    model: bge-reranker-base
    top_k: 20
  iteration:
    max_loops: 1
    retry_confidence_threshold: 0.6
  compression:
    mmr_top_k: 6
    mmr_lambda: 0.7
  answer:
    max_chars: 300
    source_limit: 4
  # 速度与成本优化
  max_rewrite_queries: 6

# MCP配置
mcp:
  server_url: http://127.0.0.1:9000
  timeout: 120
  max_retries: 3