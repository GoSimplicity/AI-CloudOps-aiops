# AI-CloudOps 应用配置
app:
  debug: true
  host: 0.0.0.0
  port: 8080
  log_level: INFO

# Prometheus监控配置
prometheus:
  host: 127.0.0.1:9090
  timeout: 30

# LLM模型配置
llm:
  provider: openai
  model: deepseek-ai/DeepSeek-V3
  task_model: Qwen/Qwen2.5-14B-Instruct
  temperature: 0.7
  max_tokens: 2048
  request_timeout: 15
  ollama_model: qwen2.5:3b
  ollama_base_url: http://127.0.0.1:11434/v1

# Kubernetes配置
kubernetes:
  in_cluster: false
  config_path: deploy/kubernetes/config
  namespace: default

# 自动修复/多Agent配置
remediation:
  enabled: true
  dry_run: true           # 高风险环境建议开启
  allow_rollback: true    # 验证失败自动回滚
  verify_wait_seconds: 20 # 验证等待时间
  max_concurrent: 3
  safe_mode: false        # 仅告警不执行变更
  namespace_whitelist: []
  namespace_blacklist: []

# 根因分析配置
rca:
  default_time_range: 30
  max_time_range: 4320
  anomaly_threshold: 0.65 
  correlation_threshold: 0.7
  request_override: false
  default_metrics:
    # 动态资源与网络
    - container_cpu_usage_seconds_total
    - container_memory_working_set_bytes
    - container_network_receive_bytes_total
    - container_network_transmit_bytes_total
    # 重启与就绪
    - kube_pod_container_status_restarts_total
    - kube_pod_container_status_ready
    - kube_pod_container_status_running
    - kube_pod_container_status_terminated
    - kube_pod_container_status_waiting
    # Kubelet 与 Node
    - kubelet_running_pod_count
    - kubelet_running_container_count
    - node_cpu_seconds_total
    - node_memory_MemFree_bytes
    # 工作负载可用性
    - kube_deployment_status_replicas_unavailable
  # 性能与资源控制（根据机器资源调整）
  metrics_step_minutes: 1           # PromQL 步长（分钟）；增大可降低采样点数
  metrics_fetch_concurrency: 3      # 并发抓取 Prometheus 的最大并发
  max_series_per_metric: 5          # 每个基础指标最多保留多少条标签序列
  max_total_series: 300             # 单次分析最多总序列数上限
  correlation_max_columns: 100      # 相关性计算最多列数（超出将截断）
  correlation_return_top_k: 5       # 每个指标返回Top K对
  enable_cross_lag_in_analyze: false # 综合分析是否启用跨时滞（较耗时/CPU）
  cross_lag_max_lags: 5             # 跨时滞最大滞后窗口
  cross_lag_max_pairs_per_metric: 3 # 每个指标返回的跨时滞对上限
  recover_on_startup: true
  recover_stale_seconds: 300
  recover_max_jobs: 100

# 日志采集配置
logs:
  enabled: true
  tail_lines: 200
  max_pods: 5
  include_previous: false

# Trace/OTel/Jaeger 配置
tracing:
  enabled: false
  provider: jaeger
  jaeger_query_url: http://127.0.0.1:16686
  timeout: 15
  service_name: ""
  max_traces: 30

# 预测配置
prediction:
  model_path: data/models/time_qps_auto_scaling_model.pkl
  scaler_path: data/models/time_qps_auto_scaling_scaler.pkl
  max_instances: 20
  min_instances: 1

# 通知配置
notification:
  enabled: true

# Redis配置
redis:
  host: 127.0.0.1
  port: 6379
  db: 0
  password: "v6SxhWHyZC7S"
  connection_timeout: 5
  max_connections: 10
  socket_timeout: 5

# MySQL 数据库（仅用于本服务 cl_ 前缀表，不影响主平台表）
database:
  host: localhost
  port: 3306
  username: root
  password: root
  name: cloudops
  echo: false
  pool_size: 5
  max_overflow: 10
  pool_recycle: 1800

# RAG助手配置
rag:
  vector_db_path: data/vector_db
  collection_name: aiops-assistant
  knowledge_base_path: data/knowledge_base
  openai_embedding_model: Pro/BAAI/bge-m3
  ollama_embedding_model: nomic-embed-text

  # LangGraph/RAG 细粒度参数
  retrieve:
    k: 12
    score_threshold: 0.0
    hybrid_enabled: false    # 预留：向量+BM25/关键词混合
  reranker:
    enabled: false           # 预留：如 bge-reranker/jina-reranker
    model: bge-reranker-base
    top_k: 20
  iteration:
    max_loops: 1
    retry_confidence_threshold: 0.6
  compression:
    mmr_top_k: 6
    mmr_lambda: 0.7
  answer:
    max_chars: 300
    source_limit: 4
  # 速度与成本优化
  max_rewrite_queries: 6

# MCP配置
mcp:
  server_url: http://127.0.0.1:9000
  timeout: 120
  max_retries: 3